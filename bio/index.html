<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bio Quiz Fotosynthese</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f3f7ff;color:#172033}.wrap{max-width:820px;margin:auto;padding:18px}.card{background:white;border:1px solid #dce5f2;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 10px 25px #0001}h1{font-size:clamp(30px,8vw,48px);margin:10px 0}.sub{color:#667085;font-size:17px}.btn,.ans{border:0;border-radius:16px;padding:14px 16px;font-weight:800;font-size:17px;cursor:pointer}.btn{background:#2563eb;color:white}.btn2{background:white;color:#172033;border:1px solid #dce5f2}.ans{width:100%;text-align:left;background:white;border:1px solid #dce5f2}.ans.ok{background:#e8fff3;border-color:#40b979}.ans.bad{background:#fff0f0;border-color:#e38181}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.bar{height:12px;background:#e4eaf5;border-radius:99px;overflow:hidden}.bar>div{height:100%;background:#16a34a;width:0}.tag{display:inline-block;background:#eef4ff;color:#315fbd;border-radius:99px;padding:5px 10px;font-weight:800;font-size:13px;margin-top:14px}.q{font-size:22px;font-weight:850;line-height:1.35}.fb{font-weight:850;min-height:28px;margin-top:12px}.hide{display:none}.top{display:flex;justify-content:space-between;color:#667085;font-weight:800}.pill{border:1px solid #dce5f2;background:white;border-radius:99px;padding:10px 13px;font-weight:800;cursor:pointer}.pill.active{background:#2563eb;color:white}.blank{display:inline-block;min-width:120px;border-bottom:3px solid #172033;height:1.1em}</style></head><body><div class="wrap"><div class="card"><div class="sub">Klasse 7 · Biologie</div><h1>Fotosynthese Quiz</h1><p class="sub">Lückentext-Quiz zur Bio-Klassenarbeit. Fragen werden gemischt.</p><div id="setup"><p><b>Anzahl Fragen</b></p><div class="grid"><button class="pill active" data-n="10">10</button><button class="pill" data-n="15">15</button><button class="pill" data-n="all">Alle</button></div><p></p><button class="btn" onclick="start()">Start</button></div></div><div id="quiz" class="card hide"><div class="top"><span id="num"></span><span id="score"></span></div><div class="bar"><div id="bar"></div></div><div id="tag" class="tag"></div><div id="q" class="q"></div><div id="answers" class="grid"></div><div id="fb" class="fb"></div><div class="grid"><button class="btn btn2" onclick="solve()">Lösung zeigen</button><button id="next" class="btn" disabled onclick="next()">Weiter</button></div></div><div id="done" class="card hide"><h2>Fertig 🎉</h2><p id="res" class="q"></p><div class="grid"><button class="btn" onclick="location.reload()">Nochmal</button><button id="wrongBtn" class="btn btn2" onclick="repeatWrong()">Falsche wiederholen</button></div></div></div><script>const DATA=[['Bedeutung','Die Fotosynthese ist für das Leben auf der Erde sehr _____.','wichtig',['wichtig','selten','gefährlich','laut']],['Bedeutung','Ohne Fotosynthese könnten Pflanzen, Tiere und Menschen nicht _____.','existieren',['existieren','schlafen','fliegen','rechnen']],['Bedeutung','Bei der Fotosynthese stellen Pflanzen ihre eigenen _____ her.','Nährstoffe',['Nährstoffe','Geräusche','Steine','Tiere']],['Bedeutung','Pflanzen produzieren dabei _____, den Menschen und Tiere zum Atmen brauchen.','Sauerstoff',['Sauerstoff','Kohlenstoffdioxid','Wasser','Erde']],['Begriff','Das Wort Fotosynthese setzt sich aus den griechischen Wörtern „photo“ und „_____“ zusammen.','synthesis',['synthesis','system','sonne','stärke']],['Begriff','Fotosynthese bedeutet so viel wie „Zusammensetzen mit Hilfe von _____“.','Licht',['Licht','Wasser','Luft','Erde']],['Ort','Die Fotosynthese läuft in den grünen _____ der Pflanzen ab.','Blättern',['Blättern','Wurzeln','Samen','Blüten']],['Ort','Der grüne Farbstoff in den Blättern heißt _____.','Chlorophyll',['Chlorophyll','Traubenzucker','Sauerstoff','Stärke']],['Ort','Chlorophyll ermöglicht es der Pflanze, das Sonnenlicht _____ und für die Fotosynthese zu nutzen.','aufzunehmen',['aufzunehmen','wegzuwerfen','zu trinken','zu speichern']],['Voraussetzungen','Damit Fotosynthese stattfinden kann, benötigt die Pflanze Lichtenergie, Wasser und _____.','Kohlenstoffdioxid',['Kohlenstoffdioxid','Sauerstoff','Stärke','Fruchtzucker']],['Voraussetzungen','Das Wasser nimmt die Pflanze über ihre _____ aus dem Boden auf.','Wurzeln',['Wurzeln','Blüten','Früchte','Blätter']],['Voraussetzungen','Das Wasser wird durch _____ bis in die Blätter transportiert.','Leitungsbahnen',['Leitungsbahnen','Straßen','Adern von Tieren','Wolken']],['Voraussetzungen','Das Kohlenstoffdioxid stammt aus der _____.','Luft',['Luft','Erde','Wurzel','Sonne']],['Vorgang','Kohlenstoffdioxid + Wasser + Sonnenlicht → Traubenzucker + _____.','Sauerstoff',['Sauerstoff','Chlorophyll','Stärke','Fruchtzucker']],['Produkte','Mit Hilfe von Lichtenergie stellt die Pflanze aus Wasser und Kohlenstoffdioxid _____ her.','Traubenzucker',['Traubenzucker','Sauerstoff','Chlorophyll','Getreide']],['Produkte','Traubenzucker dient der Pflanze als wichtige _____.','Energiequelle',['Energiequelle','Schutzschicht','Atemluft','Giftquelle']],['Produkte','Ein Teil des Traubenzuckers wird sofort _____.','verbraucht',['verbraucht','verboten','gefroren','versteckt']],['Produkte','Ein anderer Teil wird zu Stärke umgewandelt und _____.','gespeichert',['gespeichert','vergessen','geatmet','verbrannt']],['Stärke','Aus Traubenzucker kann die Pflanze weitere Stoffe herstellen, zum Beispiel _____.','Fruchtzucker',['Fruchtzucker','Sauerstoff','Kohlendioxid','Licht']],['Stärke','Viele Pflanzen speichern Energie in Form von _____.','Stärke',['Stärke','Luft','Licht','Wasser']],['Stärke','Stärke befindet sich zum Beispiel in Wurzeln, Knollen, Samen und _____.','Getreidekörnern',['Getreidekörnern','Wolken','Tieren','Sonnenstrahlen']],['Mensch und Tier','Der bei der Fotosynthese entstehende Sauerstoff ist _____ für Menschen und Tiere.','lebensnotwendig',['lebensnotwendig','unwichtig','schädlich','selten']],['Mensch und Tier','Ohne Sauerstoff könnten Menschen und Tiere nicht _____.','überleben',['überleben','schreiben','wachsen','blühen']],['Mensch und Tier','Alle Lebewesen sind direkt oder indirekt auf die _____ angewiesen.','Fotosynthese',['Fotosynthese','Dunkelheit','Kälte','Essigsäure']]];let pool=[],i=0,score=0,wrong=[],answered=false,n='10';document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-n]').forEach(x=>x.classList.remove('active'));b.classList.add('active');n=b.dataset.n});function sh(a){return[...a].sort(()=>Math.random()-.5)}function start(p){pool=sh(p||DATA);if(n!='all'&&!p)pool=pool.slice(0,+n);i=0;score=0;wrong=[];document.getElementById('setup').classList.add('hide');document.getElementById('done').classList.add('hide');document.getElementById('quiz').classList.remove('hide');show()}function show(){answered=false;let x=pool[i];num.textContent=`Frage ${i+1} von ${pool.length}`;window.score.textContent=`Punkte: ${score}`;bar.style.width=i/pool.length*100+'%';tag.textContent=x[0];q.innerHTML=x[1].replace('_____', '<span class=blank></span>');answers.innerHTML='';fb.textContent='';next.disabled=true;sh(x[3]).forEach(o=>{let b=document.createElement('button');b.className='ans';b.textContent=o;b.onclick=()=>pick(b,o);answers.appendChild(b)})}function pick(b,o){if(answered)return;answered=true;let x=pool[i],ok=o==x[2];document.querySelectorAll('.ans').forEach(a=>{a.disabled=true;if(a.textContent==x[2])a.classList.add('ok')});if(ok){score++;fb.textContent='Richtig!'}else{b.classList.add('bad');wrong.push(x);fb.textContent='Richtig wäre: '+x[2]}window.score.textContent=`Punkte: ${score}`;next.disabled=false}function solve(){if(answered)return;let x=pool[i];answered=true;wrong.push(x);document.querySelectorAll('.ans').forEach(a=>{a.disabled=true;if(a.textContent==x[2])a.classList.add('ok')});fb.textContent='Lösung: '+x[2];next.disabled=false}function next(){i++;i>=pool.length?done():show()}function done(){quiz.classList.add('hide');document.getElementById('done').classList.remove('hide');let p=Math.round(score/pool.length*100);res.innerHTML=`${score} von ${pool.length} Punkten (${p}%).`;wrongBtn.disabled=!wrong.length}function repeatWrong(){n='all';start(wrong)}</script></body></html>
