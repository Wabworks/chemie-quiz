<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gemeinschaftskunde Quiz</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7fb;color:#172033}.wrap{max-width:820px;margin:auto;padding:18px}.card{background:white;border:1px solid #dce5f2;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 10px 25px #0001}h1{font-size:clamp(30px,8vw,48px);margin:10px 0}.sub{color:#667085;font-size:17px}.btn,.ans{border:0;border-radius:16px;padding:14px 16px;font-weight:800;font-size:17px;cursor:pointer}.btn{background:#2563eb;color:white}.btn2{background:white;color:#172033;border:1px solid #dce5f2}.ans{width:100%;text-align:left;background:white;border:1px solid #dce5f2}.ans.ok{background:#e8fff3;border-color:#40b979}.ans.bad{background:#fff0f0;border-color:#e38181}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.bar{height:12px;background:#e4eaf5;border-radius:99px;overflow:hidden}.bar>div{height:100%;background:#16a34a;width:0}.tag{display:inline-block;background:#eef4ff;color:#315fbd;border-radius:99px;padding:5px 10px;font-weight:800;font-size:13px;margin-top:14px}.q{font-size:22px;font-weight:850;line-height:1.35}.fb{font-weight:850;min-height:28px;margin-top:12px}.hide{display:none}.top{display:flex;justify-content:space-between;color:#667085;font-weight:800}.pill{border:1px solid #dce5f2;background:white;border-radius:99px;padding:10px 13px;font-weight:800;cursor:pointer}.pill.active{background:#2563eb;color:white}.blank{display:inline-block;min-width:120px;border-bottom:3px solid #172033;height:1.1em}</style></head><body><div class="wrap"><div class="card"><div class="sub">Klasse 7 · Gemeinschaftskunde</div><h1>GK Quiz</h1><p class="sub">Lückentext-Quiz zu Internet, Datenschutz, Deepfakes, Nachrichten, Medien und Social Media.</p><div id="setup"><p><b>Thema</b></p><div class="grid"><button class="pill active" data-topic="all">Alles</button><button class="pill" data-topic="internet">Internet</button><button class="pill" data-topic="deepfake">Deepfakes</button><button class="pill" data-topic="news">Nachrichten</button><button class="pill" data-topic="social">Social Media</button></div><p><b>Anzahl Fragen</b></p><div class="grid"><button class="pill active" data-n="10">10</button><button class="pill" data-n="15">15</button><button class="pill" data-n="all">Alle</button></div><p></p><button class="btn" onclick="start()">Start</button></div></div><div id="quiz" class="card hide"><div class="top"><span id="num"></span><span id="score"></span></div><div class="bar"><div id="bar"></div></div><div id="tag" class="tag"></div><div id="q" class="q"></div><div id="answers" class="grid"></div><div id="fb" class="fb"></div><div class="grid"><button class="btn btn2" onclick="solve()">Lösung zeigen</button><button id="next" class="btn" disabled onclick="nextQ()">Weiter</button></div></div><div id="done" class="card hide"><h2>Fertig 🎉</h2><p id="res" class="q"></p><div class="grid"><button class="btn" onclick="location.reload()">Nochmal</button><button id="wrongBtn" class="btn btn2" onclick="repeatWrong()">Falsche wiederholen</button></div></div></div><script>const DATA=[['internet','Internet','Das Internet ist ein weltweites _____ aus unzähligen Computern und anderen Geräten.','Netzwerk',['Netzwerk','Laubblatt','Sauerstoff','Heft']],['internet','Internet','Diese Geräte sind miteinander _____ und können Informationen austauschen.','verbunden',['verbunden','verboten','verbraucht','vergrößert']],['internet','Internet','Wenn du eine Internetseite aufrufst, gibst du eine Adresse in den _____ ein.','Browser',['Browser','Boden','Blatt','Stamm']],['internet','Internet','Dieser sendet eine Anfrage an einen _____, auf dem die gewünschte Seite gespeichert ist.','Server',['Server','Schüler','Baum','Zettel']],['internet','Internet','Die Daten einer Internetseite werden in kleine _____ aufgeteilt.','Datenpakete',['Datenpakete','Getreidekörner','Laubblätter','Bilderrahmen']],['internet','Internet','Die Datenpakete werden am Ende wieder _____ zusammengesetzt.','zusammen',['zusammen','alleine','falsch','laut']],['internet','Internet','Daten können über Glasfaserkabel, WLAN oder _____ übertragen werden.','Mobilfunknetz',['Mobilfunknetz','Chlorophyll','Traubenzucker','Wurzel']],['internet','Internet','Server sind leistungsstarke Computer, die Daten speichern und _____ beantworten.','Anfragen',['Anfragen','Wurzeln','Pausen','Früchte']],['internet','Internet','Im Internet sind nicht alle _____ richtig oder vertrauenswürdig.','Informationen',['Informationen','Blüten','Blätter','Tiere']],['internet','Internet','Deshalb ist es wichtig, Informationen zu _____.','überprüfen',['überprüfen','verstecken','essen','malen']],['internet','Internet','Mit persönlichen _____ sollte man vorsichtig umgehen.','Daten',['Daten','Blättern','Wurzeln','Früchten']],['deepfake','Datenschutz','Das Thema lautet: Datenschutz – Wem gehört mein _____?','Bild',['Bild','Heft','Stift','Wasser']],['deepfake','Deepfakes','Deepfakes sind gefälschte Videos, Bilder oder Stimmen, die mit Hilfe von _____ erstellt werden.','KI',['KI','Papier','Radio','Wasser']],['deepfake','Deepfakes','Bei Deepfakes kann ein Gesicht in ein Video _____ werden.','eingearbeitet',['eingearbeitet','weggeworfen','ausgedruckt','geschnitten']],['deepfake','Deepfakes','Bei Deepfakes kann auch eine Stimme _____ werden.','verändert',['verändert','gegessen','gezeichnet','gewogen']],['deepfake','Deepfakes','Ein Problem ist, dass man denkt, etwas sei passiert, obwohl es nicht _____.','stimmt',['stimmt','glänzt','wächst','schläft']],['deepfake','Leitfragen','Eine wichtige Frage lautet: Wie _____ ist das Internet?','nützlich',['nützlich','grün','schwer','rund']],['deepfake','Leitfragen','Eine wichtige Frage lautet: Wie viel Macht haben die _____?','Medien',['Medien','Pflanzen','Tiere','Wurzeln']],['deepfake','Leitfragen','Eine wichtige Frage lautet: Wie gehen Medien mit unseren _____ um?','Daten',['Daten','Blättern','Schuhen','Wurzeln']],['deepfake','Leitfragen','Eine wichtige Frage lautet: Welche rechtlichen _____ gibt es dabei?','Sätze',['Sätze','Bilder','Tiere','Farben']],['news','Nachrichten','Journalistinnen und Journalisten nutzen die 7 W-Fragen, damit Nachrichten _____ sind.','vollständig',['vollständig','unsichtbar','nass','rund']],['news','Nachrichten','Zu den 7 W-Fragen gehören: Wer, Was, Wann, Wo, Wie, Warum und Woher stammt die _____.','Information',['Information','Wurzel','Blume','Stärke']],['news','Nachrichten','Bei einer Nachricht passiert zuerst ein _____.','Ereignis',['Ereignis','Browser','Chlorophyll','Laubblatt']],['news','Nachrichten','Journalistinnen und Journalisten _____ anschließend.','recherchieren',['recherchieren','schlafen','gießen','rechnen']],['news','Nachrichten','Vor der Veröffentlichung werden Informationen _____.','geprüft',['geprüft','versteckt','gegessen','gemalt']],['news','Fake News','Fake News erkennt man besser, wenn man Informationen _____.','prüft',['prüft','versteckt','isst','malt']],['news','Fake News','Bei Fake News sollte man mehrere Quellen _____.','vergleichen',['vergleichen','wegwerfen','gießen','füttern']],['news','Fake News','Man sollte nicht nur _____ lesen.','Überschriften',['Überschriften','Wurzeln','Blätter','Früchte']],['news','Fake News','Man sollte nach dem _____ suchen.','Autor',['Autor','Sauerstoff','Wasser','Boden']],['news','Fake News','Man sollte nicht alles sofort _____.','weiterleiten',['weiterleiten','einpflanzen','atmen','speichern']],['social','Social Media','Die Frage war: Sollten Social Media für unter _____-Jährige verboten werden?','16',['16','6','60','26']],['social','Social Media','Contra: Auf Social Media kann man den Umgang mit Social Media _____.','erlernen',['erlernen','vergessen','verbieten','ausdrucken']],['social','Social Media','Contra: Auch _____ kann über Social Media gelingen.','Lernen',['Lernen','Schlafen','Essen','Schneiden']],['social','Social Media','Pro: Social Media kann zu Ängsten und _____ führen.','Sucht',['Sucht','Fotosynthese','Sauerstoff','Wasser']],['social','Social Media','Pro: Es wird oft nur _____ gezeigt.','Gutes',['Gutes','Wasser','Papier','Chlorophyll']],['social','Social Media','Pro: Unter 16 ist das Gehirn noch in der _____.','Entwicklung',['Entwicklung','Fotosynthese','Nachricht','Wurzel']],['social','Social Media','Eine Meinung war: Social Media ist gut, wenn man _____ ist.','geschützt',['geschützt','verboten','laut','unsichtbar']],['social','Social Media','Ein Vorteil war: Zum Englischlernen sind manche Inhalte nützlich, weil man Sachen auf Englisch _____ kann.','schauen',['schauen','pflanzen','wiegen','kochen']]];let topic='all',n='10',pool=[],i=0,score=0,wrong=[],answered=false;document.querySelectorAll('[data-topic]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-topic]').forEach(x=>x.classList.remove('active'));b.classList.add('active');topic=b.dataset.topic});document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-n]').forEach(x=>x.classList.remove('active'));b.classList.add('active');n=b.dataset.n});function sh(a){return[...a].sort(()=>Math.random()-.5)}function start(p){let base=p||DATA.filter(x=>topic=='all'||x[0]==topic);pool=sh(base);if(n!='all'&&!p)pool=pool.slice(0,+n);i=0;score=0;wrong=[];setup.classList.add('hide');done.classList.add('hide');quiz.classList.remove('hide');show()}function show(){answered=false;let x=pool[i];num.textContent=`Frage ${i+1} von ${pool.length}`;window.score.textContent=`Punkte: ${score}`;bar.style.width=i/pool.length*100+'%';tag.textContent=x[1];q.innerHTML=x[2].replace('_____', '<span class=blank></span>');answers.innerHTML='';fb.textContent='';next.disabled=true;sh(x[4]).forEach(o=>{let b=document.createElement('button');b.className='ans';b.textContent=o;b.onclick=()=>pick(b,o);answers.appendChild(b)})}function pick(b,o){if(answered)return;answered=true;let x=pool[i],ok=o==x[3];document.querySelectorAll('.ans').forEach(a=>{a.disabled=true;if(a.textContent==x[3])a.classList.add('ok')});if(ok){score++;fb.textContent='Richtig!'}else{b.classList.add('bad');wrong.push(x);fb.textContent='Richtig wäre: '+x[3]}window.score.textContent=`Punkte: ${score}`;next.disabled=false}function solve(){if(answered)return;let x=pool[i];answered=true;wrong.push(x);document.querySelectorAll('.ans').forEach(a=>{a.disabled=true;if(a.textContent==x[3])a.classList.add('ok')});fb.textContent='Lösung: '+x[3];next.disabled=false}function nextQ(){i++;i>=pool.length?finish():show()}function finish(){quiz.classList.add('hide');done.classList.remove('hide');let p=Math.round(score/pool.length*100);res.innerHTML=`${score} von ${pool.length} Punkten (${p}%).`;wrongBtn.disabled=!wrong.length}function repeatWrong(){n='all';start(wrong)}</script></body></html>
